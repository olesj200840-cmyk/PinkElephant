<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Pink Elephant</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <!-- Подключаем шрифт Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Приветственное модальное окно -->
    <div id="welcome-modal">
        <div class="modal-welcome-content">
            <img src="./image/logo_1.jpg" alt="Логотип Pink Elephant" class="logo">
            <h1>Pink Elephant</h1>
            <button id="start-button">Продолжить</button>
        </div>
    </div>

    <header>
        <div class="logo-container">
            <img src="./image/logo_1.jpg" alt="Pink Elephant" class="site-logo">
            <h1 class="site-title">Pink Elephant</h1>
        </div>

        <nav class="sidebar">
            <a href="index.html" class="nav-link active">
                <span class="icon">🏠</span>
                <span class="label">Главная</span>
            </a>
            <a href="profile.html" class="nav-link">
                <span class="icon">👤</span>
                <span class="label">Профиль</span>
            </a>
            <a href="#cart" class="nav-link">
                <span class="icon">🛒</span>
                <span class="label">Корзина</span>
            </a>
            <a href="#settings" class="nav-link">
                <span class="icon">⚙️</span>
                <span class="label">Настройки</span>
            </a>
        </nav>
    </header>

    <main role="main">
        <ul id="product-list">
            <!-- Товары будут появляться здесь автоматически -->
        </ul>
    </main>

    <footer role="contentinfo">&copy; Pink Elephant, 2025</footer>

    <!-- Модальное окно для товара -->
    <div id="modal" class="hidden" role="dialog" aria-hidden="true">
        <div class="modal-content">
            <span class="close-button" aria-label="Закрыть">×</span>
            <h2></h2>
            <p></p>
        </div>
    </div>

    <!-- Регистрация Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(function() { console.log('Service Worker Registered'); })
                .catch(function(error) { console.log('Error registering Service Worker:', error); });
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
