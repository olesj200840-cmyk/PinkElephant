<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — Pink Elephant</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Подключаем шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Стили только для профиля */
        .profile-container {
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            font-family: 'Times New Roman', serif;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ff69b4;
            margin-bottom: 15px;
            background-color: #f0f0f0;
        }

        .username {
            font-size: 18px;
            color: #333;
            margin: 10px 0;
        }

        .profile-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .profile-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .edit-btn {
            background-color: #ff69b4;
            color: white;
        }

        .edit-btn:hover {
            background-color: #e04e9c;
        }

        .logout-btn {
            background-color: #eee;
            color: #333;
        }

        .logout-btn:hover {
            background-color: #ddd;
        }

        /* Навигация назад */
        .back-link {
            display: block;
            margin: 20px auto;
            text-align: center;
            color: #ff69b4;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <!-- Аватарка (временно — placeholder) -->
        <img src="./image/profil.jpg" alt="Аватар пользователя" class="avatar">

        <!-- Имя пользователя -->
        <div class="username">Иван Иванов</div>

        <!-- Кнопки -->
        <div class="profile-buttons">
            <button class="profile-btn edit-btn">Редактировать профиль</button>
            <button class="profile-btn logout-btn">Выйти</button>
        </div>
    </div>

    <!-- Ссылка "Назад" -->
    <a href="index.html" class="back-link">← Вернуться в магазин</a>
</body>
</html>
